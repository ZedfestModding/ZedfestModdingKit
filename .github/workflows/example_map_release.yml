name: example_map_release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  make_release:
    name: example_map_release
    runs-on: [self-hosted, windows, x64]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv with caching enabled
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project with all dev dependencies
        run: uv sync --locked --all-extras --dev

      - name: Install tempo-cli
        run: uv tool install git+https://www.github.com/Tempo-Organization/tempo-cli

      - name: Run tempo-cli mod release creation command
        run: tempo_cli run full_run_all --settings_json ".tempo.json"

      # --- New step: list all zip files and print ---
      - name: List all release zip files and print mod info
        run: |
          python - << 'END'
          import glob, os, json

          releases_dir = r"current_dir\Modding\releases"
          tempo_json_path = r"current_dir\.tempo.json"

          # List all zip files
          zip_files = glob.glob(os.path.join(releases_dir, "*.zip"))
          if zip_files:
              print("Found release zip files:")
              for f in zip_files:
                  print(" -", os.path.basename(f))
          else:
              print("No zip files found in", releases_dir)

          # Print .tempo.json contents
          print("\nContents of .tempo.json:")
          with open(tempo_json_path, "r", encoding="utf-8") as f:
              data = json.load(f)
              print(json.dumps(data, indent=2))

          # Extract mod info (name, version, description)
          if "mods" in data:
              print("\nMod info:")
              for mod in data["mods"]:
                  name = mod.get("name", "<unknown>")
                  version = mod.get("version", "<unknown>")
                  desc = mod.get("description", "<no description>")
                  print(f" - {name} v{version}: {desc}")
          END
