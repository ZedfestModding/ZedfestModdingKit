name: example_map_release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  make_release:
    name: example_map_release
    runs-on: [self-hosted, windows, x64]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv with caching enabled
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project with all dev dependencies
        run: uv sync --locked --all-extras --dev

      - name: Install tempo-cli
        run: uv tool install git+https://www.github.com/Tempo-Organization/tempo-cli

      - name: Run tempo-cli mod release creation command
        run: tempo_cli run full_run_all --settings_json ".tempo.json"

      # --- New step: list all zip files in Modding/releases ---
      - name: List all release zip files
        run: |
          echo Listing all zip files in current_dir\Modding\releases
          for %%f in ("current_dir\Modding\releases\*.zip") do (
              echo Found release file: %%~nxf
          )

      # --- New step: print .tempo.json contents ---
      - name: Print .tempo.json contents
        run: |
          echo Contents of current_dir\.tempo.json:
          type current_dir\.tempo.json

